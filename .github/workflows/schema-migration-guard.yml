name: Schema Migration Guard

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/schema-migration-guard.yml"
      - "alembic.ini"
      - "app/db/**"
      - "migrations/**"
      - "pyproject.toml"
      - "tests/test_database_migrations.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/schema-migration-guard.yml"
      - "alembic.ini"
      - "app/db/**"
      - "migrations/**"
      - "pyproject.toml"
      - "tests/test_database_migrations.py"

jobs:
  schema-migration-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run schema migration guard
        run: python -m pytest -q tests/test_database_migrations.py

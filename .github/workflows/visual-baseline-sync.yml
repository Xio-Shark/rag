name: Visual Baseline Sync

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    paths:
      - ".github/workflows/visual-baseline-sync.yml"
      - ".github/workflows/visual-regression-e2e.yml"
      - "README.md"
      - "docs/visual-regression-baselines.md"
      - "scripts/render_visual_regression_baselines.py"
      - "tests/baselines/*.png"
      - "tests/baselines/manifest.json"
      - "tests/test_e2e_visual_regression.py"
      - "tests/test_visual_baseline_manifest.py"
      - "tests/test_visual_regression.py"
      - "tests/visual_regression.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/visual-baseline-sync.yml"
      - ".github/workflows/visual-regression-e2e.yml"
      - "README.md"
      - "docs/visual-regression-baselines.md"
      - "scripts/render_visual_regression_baselines.py"
      - "tests/baselines/*.png"
      - "tests/baselines/manifest.json"
      - "tests/test_e2e_visual_regression.py"
      - "tests/test_visual_baseline_manifest.py"
      - "tests/test_visual_regression.py"
      - "tests/visual_regression.py"

jobs:
  verify-visual-baseline-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lightweight lint gate
        run: python -m ruff check app tests

      - name: Run visual baseline manifest tests
        run: python -m pytest -q tests/test_visual_baseline_manifest.py

      - name: Check rendered visual baseline document
        run: python scripts/render_visual_regression_baselines.py --check

      - name: Print changed visual baseline summary
        id: baseline_summary
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          summary_file="$RUNNER_TEMP/visual-baseline-summary.md"
          : > "$summary_file"
          echo "summary_path=$summary_file" >> "$GITHUB_OUTPUT"

          write_summary() {
            printf '%s\n' "$1"
            printf '%s\n' "$1" >> "$summary_file"
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            summary=$(python scripts/render_visual_regression_baselines.py --summary)
            write_summary "$summary"
            exit 0
          fi

          mapfile -t changed_paths < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- "tests/baselines/*.png")

          if [ "${#changed_paths[@]}" -eq 0 ]; then
            write_summary "No formal visual baseline PNG changes detected."
            exit 0
          fi

          args=()
          for path in "${changed_paths[@]}"; do
            args+=(--path "$path")
          done

          summary=$(python scripts/render_visual_regression_baselines.py --summary "${args[@]}")
          write_summary "$summary"

      - name: Comment changed visual baseline summary on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v8
        env:
          SUMMARY_PATH: ${{ steps.baseline_summary.outputs.summary_path }}
        with:
          script: |
            const fs = require('fs')
            const marker = '<!-- visual-baseline-summary -->'
            const summaryPath = process.env.SUMMARY_PATH
            const summary = fs.readFileSync(summaryPath, 'utf8').trim()
            const body = `${marker}\n${summary}`

            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })

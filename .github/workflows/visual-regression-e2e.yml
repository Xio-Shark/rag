name: Visual Regression E2E

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    paths:
      - ".github/workflows/visual-regression-e2e.yml"
      - "app/**"
      - "pyproject.toml"
      - "tests/baselines/**"
      - "tests/conftest.py"
      - "tests/test_e2e_visual_regression.py"
      - "tests/visual_regression.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/visual-regression-e2e.yml"
      - "app/**"
      - "pyproject.toml"
      - "tests/baselines/**"
      - "tests/conftest.py"
      - "tests/test_e2e_visual_regression.py"
      - "tests/visual_regression.py"

jobs:
  visual-regression-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run visual regression E2E tests
        run: |
          python -m pytest -q tests/test_e2e_visual_regression.py \
            --junitxml "$RUNNER_TEMP/visual-regression-e2e-junit.xml"

      - name: Upload visual regression JUnit report
        id: upload_junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-junit
          path: ${{ runner.temp }}/visual-regression-e2e-junit.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload visual regression diagnostics
        id: upload_diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diagnostics
          path: |
            tests/baselines/*.actual.png
            tests/baselines/*.diff.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Write visual regression diagnostic summary
        id: diagnostic_summary
        if: failure()
        run: |
          summary_file="$RUNNER_TEMP/visual-regression-diagnostic-summary.md"
          : > "$summary_file"
          echo "summary_path=$summary_file" >> "$GITHUB_OUTPUT"

          shopt -s nullglob
          args=()
          for path in tests/baselines/*.actual.png tests/baselines/*.diff.png; do
            args+=(--artifact-path "$path")
          done

          summary=$(python scripts/render_visual_regression_baselines.py --diagnostic-summary "${args[@]}")
          printf '%s\n' "$summary"
          printf '%s\n' "$summary" >> "$summary_file"
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            printf '%s\n' "$summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload visual regression diagnostic summary
        id: upload_diagnostic_summary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diagnostic-summary
          path: ${{ steps.diagnostic_summary.outputs.summary_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Reconcile visual regression diagnostic comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v8
        env:
          JOB_STATUS: ${{ job.status }}
          SUMMARY_PATH: ${{ steps.diagnostic_summary.outputs.summary_path }}
          JUNIT_ARTIFACT_URL: ${{ steps.upload_junit.outputs.artifact-url }}
          DIAGNOSTIC_ARTIFACT_URL: ${{ steps.upload_diagnostics.outputs.artifact-url }}
          DIAGNOSTIC_SUMMARY_ARTIFACT_URL: ${{ steps.upload_diagnostic_summary.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            const fs = require('fs')
            const marker = '<!-- visual-regression-diagnostic-summary -->'
            const jobStatus = process.env.JOB_STATUS
            const runUrl = process.env.RUN_URL
            const runNumber = process.env.RUN_NUMBER
            const runAttempt = process.env.RUN_ATTEMPT
            const runSection = runUrl
              ? `\n\nRun\n- [#${runNumber} attempt ${runAttempt}](${runUrl})`
              : ''

            const artifactLinks = [
              ['JUnit XML', process.env.JUNIT_ARTIFACT_URL],
              ['失败诊断摘要', process.env.DIAGNOSTIC_SUMMARY_ARTIFACT_URL],
              ['失败诊断图片', process.env.DIAGNOSTIC_ARTIFACT_URL],
            ].filter(([, url]) => Boolean(url))

            const linksSection = artifactLinks.length
              ? `\n\nArtifacts\n${artifactLinks.map(([label, url]) => `- [${label}](${url})`).join('\n')}`
              : ''

            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (jobStatus === 'success') {
              if (!existingComment) {
                return
              }

              const body = (
                `${marker}\n视觉回归 E2E 已恢复通过，历史失败诊断已失效。${runSection}${linksSection}`
              )

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            const summaryPath = process.env.SUMMARY_PATH
            const summary = fs.readFileSync(summaryPath, 'utf8').trim()
            const body = `${marker}\n${summary}${runSection}${linksSection}`

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })
